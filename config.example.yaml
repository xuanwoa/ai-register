# 并发
concurrency: 1
# 一批注册账号数
total_accounts: 1
# 代理（国外)
proxy: "http://127.0.0.1:7890"
# 注册成功账号保存路径
token_dir: "data/token_dir"

model_provider: "openai"  # 可选，与 model_providers 一致
model_providers:
  grok:
    browser_proxy: "http://127.0.0.1:7890"
  openai:
    # 一般不修改
    enable_oauth: true
    oauth_required: true
    oauth_issuer: "https://auth.openai.com"
    oauth_client_id: "app_EMoamEEZ73f0CkXaXp7hrann"
    oauth_redirect_uri: "http://localhost:1455/auth/callback"

mail_provider: "icloud"  # 可选，与 mail_providers 一致（duckmail / tempmail / icloud）
mail_providers:
  duckmail:
    # 见：https://www.duckmail.sbs/cn/api-docs
    api_base: "https://api.duckmail.sbs"
    bearer: "<YOUR_DUCKMAIL_BEARER>"
  tempmail:
    # 见：https://tempmail.lol/cn/api
    proxy: "http://127.0.0.1:7890"
    api_key: "<YOUR_TEMPMAIL_API_KEY>"
    domain: ""
    prefix: ""
  icloud:
    # iCloud IMAP 接码：主账号 + App 专用密码 + aliases 池
    imap_username: "main_account@icloud.com"
    app_password: "xxxx-xxxx-xxxx-xxxx"
    # 推荐：使用 aliases_file 按行读取（默认提供 data/icloud_aliases.txt）
    aliases: []
    aliases_file: "data/icloud_aliases.txt"
    # alias 生命周期状态文件目录（registered_aliases.txt / in_use_aliases.txt）
    state_dir: "token_dir/icloud"

cpa:
  # 是否上传到 CPA 见：https://github.com/router-for-me/CLIProxyAPI
  enable: false
  api_url: "http://localhost:8317/v0/management/auth-files"
  token: "<YOUR_CPA_TOKEN>"
  use_proxy: false  # 是否在上传时强制使用全局 `proxy` 配置

g2a:
  # 是否上传到 grok2api 见：https://github.com/chenyme/grok2api
  enable: true
  api_url: "https://<base-url>/admin/api/tokens/add"
  token: "登录密码"
  append: false
  use_proxy: true  # 是否在上传时强制使用全局 `proxy` 配置
